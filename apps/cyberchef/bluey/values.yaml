apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cyberchef
  namespace: flux-system
spec:
  values:
    image:
      repository: mpepping/cyberchef 
      tag: v10.23.0
    service:
      ports:
        - 8000
    ingress:
      enabled: true
      className: haproxy-ingress
      annotations:
        cert-manager.io/cluster-issuer: cloudflare
      tls:
        - hosts:
          - cyberchef.babyvelociraptor.com
      hosts:
        - host: cyberchef.babyvelociraptor.com
          paths:
            - path: /
              pathType: Prefix